<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 420" role="img" aria-labelledby="title desc">
  <title id="title">FB AutoReply AI documentation banner</title>
  <desc id="desc">A product banner showing Messenger messages flowing through Groq to an automatic reply.</desc>
  <defs>
    <linearGradient id="page" x1="0" y1="0" x2="1280" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0b1220"/>
      <stop offset="0.55" stop-color="#10243d"/>
      <stop offset="1" stop-color="#0f3b31"/>
    </linearGradient>
    <linearGradient id="accent" x1="170" y1="78" x2="1090" y2="342" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1683ff"/>
      <stop offset="0.6" stop-color="#2a5df5"/>
      <stop offset="1" stop-color="#21c67a"/>
    </linearGradient>
    <linearGradient id="panel" x1="165" y1="76" x2="1120" y2="360" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#162033"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="20" stdDeviation="22" flood-color="#020617" flood-opacity="0.45"/>
    </filter>
  </defs>

  <rect width="1280" height="420" fill="url(#page)"/>
  <path d="M96 338c116-68 198-58 295 4 107 68 217 54 320-20 110-80 234-75 391-8" fill="none" stroke="#1f6feb" stroke-width="2" opacity="0.25"/>
  <path d="M120 96c150 62 268 60 354-6 88-67 188-70 302-5 95 54 204 61 366 8" fill="none" stroke="#21c67a" stroke-width="2" opacity="0.25"/>

  <rect x="88" y="64" width="1104" height="292" rx="34" fill="url(#accent)" opacity="0.5"/>
  <rect x="104" y="78" width="1072" height="264" rx="28" fill="url(#panel)" filter="url(#shadow)"/>

  <g transform="translate(144 118)">
    <rect width="290" height="184" rx="22" fill="#0f172a" stroke="#2b3b57"/>
    <rect x="28" y="30" width="168" height="28" rx="14" fill="#23314a"/>
    <rect x="92" y="76" width="164" height="30" rx="15" fill="#1683ff"/>
    <rect x="28" y="124" width="196" height="30" rx="15" fill="#23314a"/>
    <circle cx="238" cy="43" r="18" fill="#21c67a"/>
    <path d="M231 43h14M238 36v14" stroke="#082114" stroke-width="4" stroke-linecap="round"/>
    <text x="28" y="164" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#8ea3c2">incoming message</text>
  </g>

  <g transform="translate(492 116)">
    <rect width="296" height="188" rx="24" fill="#111827" stroke="#334155"/>
    <circle cx="74" cy="74" r="36" fill="#1683ff"/>
    <path d="M52 75c12-19 21-28 27-28 5 0 9 4 12 11l4 10c1 3 3 4 4 4 3 0 7-4 12-12" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
    <path d="M56 100h42" stroke="#21c67a" stroke-width="6" stroke-linecap="round"/>
    <text x="128" y="66" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="700" fill="#f8fafc">Groq</text>
    <text x="128" y="94" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" fill="#9fb2ce">Chat Completions</text>
    <rect x="34" y="132" width="228" height="18" rx="9" fill="#23314a"/>
    <rect x="34" y="160" width="168" height="18" rx="9" fill="#23314a"/>
  </g>

  <g transform="translate(846 118)">
    <rect width="290" height="184" rx="22" fill="#0f172a" stroke="#2b3b57"/>
    <rect x="94" y="30" width="168" height="30" rx="15" fill="#1683ff"/>
    <rect x="34" y="78" width="188" height="30" rx="15" fill="#23314a"/>
    <rect x="86" y="126" width="176" height="30" rx="15" fill="#21c67a"/>
    <text x="34" y="164" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#8ea3c2">typed and sent</text>
  </g>

  <path d="M454 210h42" stroke="#8fbaff" stroke-width="5" stroke-linecap="round"/>
  <path d="m486 195 20 15-20 15" fill="none" stroke="#8fbaff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M790 210h42" stroke="#8ff0c3" stroke-width="5" stroke-linecap="round"/>
  <path d="m822 195 20 15-20 15" fill="none" stroke="#8ff0c3" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="144" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="18" font-weight="700" fill="#dbeafe">FB AutoReply AI</text>
  <text x="996" y="44" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" fill="#9fb2ce">Messenger -> Groq -> Reply</text>
</svg>
